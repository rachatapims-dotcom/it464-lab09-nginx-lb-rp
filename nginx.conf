events { }

http {
    upstream my_backend {
        # เปลี่ยนเป็น Round Robin ตามโจทย์ใน README (เอา least_conn ออก)
        server host.docker.internal:8081 max_fails=3 fail_timeout=10s; 
        server host.docker.internal:8082 max_fails=3 fail_timeout=10s;
        # (เพิ่ม server 8083 และ 8084 ตามโจทย์ข้อถัดไปได้เลย)
    }

    server {
        listen 80;
        
         # 2. ปิด Keep-Alive เพื่อให้ Browser ไม่เกาะเครื่องเดิม
        keepalive_timeout 0;

        location / {
            proxy_pass http://my_backend;
            
            # 3. บังคับให้ส่ง Request ใหม่ไปหา Upstream ทุกครั้ง
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # ต้องเปิด intercept เพื่อให้ Nginx จัดการ error เองแทน backend
            proxy_intercept_errors on;
        }

        # ── Custom Error Pages (JSON Format) ──────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            # ต้องใส่ add_header ก่อน return
            add_header Content-Type application/json;
            return 503 '{"error": "Backend unavailable", "status": 503}';
        }
    }
}
